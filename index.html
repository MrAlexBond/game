<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dubai Empire</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffd700; --dark: #0f172a; --card: #1e293b; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        .header { width: 100%; padding: 20px 0; background: var(--card); text-align: center; border-bottom: 2px solid var(--gold); }
        #balance { font-size: 42px; font-weight: bold; color: var(--gold); }
        .main-game { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        .tap-area { width: 220px; height: 220px; border: 5px solid var(--gold); border-radius: 50%; overflow: hidden; cursor: pointer; transition: 0.1s; box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        .tap-area:active { transform: scale(0.95); }
        .upgrades-panel { width: 100%; background: var(--card); border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; overflow-y: auto; height: 40%; }
        .upgrade-item { background: #2d3748; border-radius: 12px; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .upgrade-img { width: 50px; height: 50px; border-radius: 8px; border: 1px solid var(--gold); margin-right: 15px; object-fit: cover; }
        .buy-btn { background: var(--gold); border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
        .buy-btn:disabled { background: #4a5568; color: #a0aec0; }
    </style>
</head>
<body>

    <div class="header">
        <div id="status" style="font-size: 12px; color: #38bdf8; letter-spacing: 1px;">СТАТУС: ОФИЦИАНТ</div>
        <div id="balance">$0</div>
    </div>

    <div class="main-game">
        <div class="tap-area" onclick="tap()">
            <img src="hero.png" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <p id="income-display" style="margin-top: 15px; color: #94a3b8;">Доход: $0 /сек</p>
    </div>

    <div class="upgrades-panel">
        <div id="upgrades-list"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Данные (убедись, что файлы называются именно так!)
        const upgradesData = [
            { id: 1, name: "Доставка еды", cost: 15, add: 1, img: "hero.png", status: "КУРЬЕР" },
            { id: 2, name: "Чайная лавка", cost: 150, add: 8, img: "shop.png", status: "ПРЕДПРИНИМАТЕЛЬ" },
            { id: 3, name: "Таксопарк", cost: 1200, add: 45, img: "taxi.png", status: "МЕНЕДЖЕР" },
            { id: 4, name: "ЖК в Дубае", cost: 15000, add: 250, img: "building.png", status: "ЗАСТРОЙЩИК" },
            { id: 5, name: "Бурдж-Халифа", cost: 200000, add: 1500, img: "burj.png", status: "ЛЕГЕНДА ДУБАЯ" }
        ];

        let money = parseFloat(localStorage.getItem('money')) || 0;
        let income = parseFloat(localStorage.getItem('income')) || 0;
        let currentStatus = localStorage.getItem('status') || "ОФИЦИАНТ";

        function tap() {
            money += 1;
            updateUI();
            save();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function buyUpgrade(id) {
            const upg = upgradesData.find(u => u.id === id);
            if (money >= upg.cost) {
                money -= upg.cost;
                income += upg.add;
                currentStatus = upg.status;
                updateUI();
                save();
            }
        }

        function save() {
            localStorage.setItem('money', money);
            localStorage.setItem('income', income);
            localStorage.setItem('status', currentStatus);
        }

        function updateUI() {
            document.getElementById('balance').innerText = '$' + Math.floor(money);
            document.getElementById('income-display').innerText = `Доход: $${income} /сек`;
            document.getElementById('status').innerText = `СТАТУС: ${currentStatus}`;
            
            const list = document.getElementById('upgrades-list');
            list.innerHTML = '';
            upgradesData.forEach(upg => {
                const item = document.createElement('div');
                item.className = 'upgrade-item';
                item.innerHTML = `
                    <div style="display: flex; align-items: center;">
                        <img src="${upg.img}" class="upgrade-img">
                        <div>
                            <div style="font-weight: bold; font-size: 14px;">${upg.name}</div>
                            <div style="font-size: 12px; color: #94a3b8;">+$${upg.add}/сек</div>
                        </div>
                    </div>
                    <button class="buy-btn" onclick="buyUpgrade(${upg.id})" ${money < upg.cost ? 'disabled' : ''}>
                        $${upg.cost}
                    </button>
                `;
                list.appendChild(item);
            });
        }

        setInterval(() => {
            money += income;
            updateUI();
        }, 1000);

        updateUI();
    </script>
</body>
</html>
